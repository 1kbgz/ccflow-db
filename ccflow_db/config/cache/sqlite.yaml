# @package cache

store:
  _target_: ccflow_db.SQLiteCacheStore
  config:
    _target_: ccflow_db.SQLiteConfig
    path: ccflow-cache.sqlite
  table: cache_entries

put:
  _target_: ccflow_etl.CachePutModel
  store: /cache/store
  format: json

get:
  _target_: ccflow_etl.CacheGetModel
  store: /cache/store
  format: json